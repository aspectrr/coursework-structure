name: release

# On push to main: builds all platforms and publishes to a rolling
# "latest" release. On a pushed v* tag: publishes a versioned release.
# Either way the app bundles are downloadable from the Releases page.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            label: macos-arm64
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            label: macos-x86_64
          - platform: ubuntu-22.04
            args: ''
            label: linux-x86_64
          - platform: windows-latest
            args: ''
            label: windows-x86_64
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - run: bun install --frozen-lockfile

      - name: pick release tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "name=Coursework ${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "draft=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "name=Coursework (latest from main)" >> "$GITHUB_OUTPUT"
            echo "draft=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.tag.outputs.tag }}
          releaseName: ${{ steps.tag.outputs.name }}
          releaseBody: |
            Built from commit ${{ github.sha }}.

            ## Install

            - **macOS (Apple Silicon):** download `*.aarch64.dmg`, drag to Applications.
              First launch: right-click → Open (the app is unsigned).
            - **macOS (Intel):** download `*.x64.dmg`.
            - **Windows:** download `*-setup.exe` and run.
            - **Linux:** download `*.AppImage` (chmod +x) or `*.deb`.
          releaseDraft: ${{ steps.tag.outputs.draft }}
          prerelease: false
          args: ${{ matrix.args }}
